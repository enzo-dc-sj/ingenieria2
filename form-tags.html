<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <title>Etiquetas de formulario</title>
</head>
<body class="p-4">
    <header class="mb-3">
        <h1>Ejemplos de etiquetas de formulario</h1>
        <nav>
            <a href="index.html" class="btn btn-outline-primary">Volver al índice</a>
            <a href="inline-tags.html" class="btn btn-link">Ver inline</a>
            <a href="block-tags.html" class="btn btn-link">Ver block</a>
        </nav>
    </header>

    <main>
        <form class="row g-3" action="#" method="post">
            <fieldset class="col-12">
                <legend>Datos personales</legend>
            </fieldset>

            <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Tu nombre">
            </div>

            <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="tu@ejemplo.com">
            </div>

            <div class="col-md-4">
                <label for="edad" class="form-label">Edad</label>
                <input type="number" id="edad" name="edad" class="form-control" min="0" max="120">
            </div>

            <div class="col-12">
                <label class="form-label">Género</label>
                <div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genero" id="m" value="m">
                        <label class="form-check-label" for="m">Masculino</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genero" id="f" value="f">
                        <label class="form-check-label" for="f">Femenino</label>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Intereses</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="i1" name="interes" value="web">
                    <label class="form-check-label" for="i1">Desarrollo web</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="i2" name="interes" value="ux">
                    <label class="form-check-label" for="i2">Diseño UX</label>
                </div>
            </div>

            <div class="col-md-6">
                <label for="pais" class="form-label">País</label>
                <select id="pais" name="pais" class="form-select">
                    <option value="ar">Argentina</option>
                    <option value="uy">Uruguay</option>
                    <option value="cl">Chile</option>
                </select>
            </div>

            <div class="col-12">
                <label for="bio" class="form-label">Biografía</label>
                <textarea id="bio" name="bio" class="form-control" rows="4"></textarea>
            </div>

            <div class="col-md-4">
                <label for="range" class="form-label">Rango</label>
                <input type="range" id="range" name="range" class="form-range">
            </div>

            <div class="col-md-4">
                <label for="fecha" class="form-label">Fecha</label>
                <input type="date" id="fecha" name="fecha" class="form-control">
            </div>

            <div class="col-12">
                <label for="color" class="form-label">Color favorito</label>
                <input type="color" id="color" name="color" class="form-control form-control-color" value="#563d7c">
            </div>

            <div class="col-12">
                <label for="file" class="form-label">Subir archivo</label>
                <input type="file" id="file" name="file" class="form-control">
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Enviar</button>
                <button type="reset" class="btn btn-secondary">Limpiar</button>
            </div>

            <div class="col-12 mt-3">
                <label for="busqueda" class="form-label">Búsqueda (datalist)</label>
                <input list="sugerencias" id="busqueda" class="form-control">
                <datalist id="sugerencias">
                    <option value="HTML">
                    <option value="CSS">
                    <option value="JavaScript">
                </datalist>
            </div>

            <div class="col-12 mt-3">
                <label class="form-label">Progreso / Nivel</label>
                <progress value="70" max="100"></progress>
                <meter value="0.7" min="0" max="1">70%</meter>
            </div>

        </form>
    </main>

    <footer class="mt-4">
        <hr>
        <p class="small">Ejemplos de etiquetas de formulario. <a href="index.html">Volver al índice</a></p>
    </footer>
</body>
</html>
